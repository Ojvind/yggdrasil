version: "3.7"

services:
    app:
        restart: always
        build: .
        ports:
            - 8000:8000
        command: sh -c "yarn install && yarn run start-dev-mongo-docker"
        volumes:
            - ./:/app
        environment:
            - SECRET=${SECRET}
            - REACT_APP_ENV=${REACT_APP_ENV:-dev}
            - DEV_DATABASE_URL=mongodb://mongo:27017/writer-dev
    mongo:
        image: mongo
        ports:
            - 27017:27017
        volumes:
            - mongodb:/data/db            
volumes:
    mongodb:
               