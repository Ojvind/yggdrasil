version: "3.7"

services:
    caddy:
        image: caddy:2-alpine
        restart: always
        ports:
            - 80:80
            - 443:443
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - app
    app:
        restart: always
        build: .
        expose:
            - 8000
        command: sh -c "yarn install && yarn run start-prod-mongo-docker"
        environment:
            - SECRET=${SECRET}
            - REACT_APP_ENV=production
            - PROD_DATABASE_URL=mongodb://mongo:27017/writer-prod
            - MINIO_PUBLIC_ENDPOINT=http://localhost:9002
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
            - MINIO_BUCKET=images
    mongo:
        image: mongo
        ports:
            - 27018:27017
        volumes:
            - mongodb:/data/db
    minio:
        image: minio/minio
        ports:
            - 9002:9000
            - 9003:9001
        volumes:
            - minio:/data
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
            - MINIO_BROWSER_REDIRECT_URL=http://localhost:9003
        command: server /data --console-address ":9001"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 5s
            timeout: 5s
            retries: 5
    minio-init:
        image: minio/mc
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
            mc mb --ignore-existing local/images;
            mc anonymous set public local/images;
            exit 0;
            "
volumes:
    mongodb:
    minio:
    caddy_data:
    caddy_config:
